name: Build and Release Installers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build_windows_installer:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read versions config
        id: versions
        run: |
          # BUG FIX 1 : Split(':')[1] tronquait les URLs contenant plusieurs ':'
          # On utilise IndexOf + Substring pour tout récupérer après le premier ':'
          $content = Get-Content versions.yml -Raw

          $line_elastix = ($content -split '\n' | Select-String 'windows_url:').Line
          $elastix_url = $line_elastix.Substring($line_elastix.IndexOf(':') + 1).Trim().Trim('"')

          $line_base = ($content -split '\n' | Select-String 'base_url:').Line
          $deepslice_base_url = $line_base.Substring($line_base.IndexOf(':') + 1).Trim().Trim('"')

          $model1 = ($content -split '\n' | Select-String 'xception_weights').Line.Split('-')[1].Trim().Replace('"', '').Replace(',', '').Trim()
          $model2 = ($content -split '\n' | Select-String 'Allen_Mixed_Best').Line.Split('-')[1].Trim().Replace('"', '').Replace(',', '').Trim()
          $model3 = ($content -split '\n' | Select-String 'Synthetic_data_final').Line.Split('-')[1].Trim().Replace('"', '').Replace(',', '').Trim()

          echo "ELASTIX_WINDOWS_URL=$elastix_url" >> $env:GITHUB_ENV
          echo "DEEPSLICE_BASE_URL=$deepslice_base_url" >> $env:GITHUB_ENV
          echo "MODEL1=$model1" >> $env:GITHUB_ENV
          echo "MODEL2=$model2" >> $env:GITHUB_ENV
          echo "MODEL3=$model3" >> $env:GITHUB_ENV

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.8
          channels: conda-forge
          conda-remove-defaults: true

      - name: Install conda-constructor
        # BUG FIX 2 (Windows) : shell explicite pour que conda soit initialisé
        shell: bash -el {0}
        run: conda install -y constructor

      - name: Prepare Windows environment
        run: |
          Invoke-WebRequest -Uri "${{ env.ELASTIX_WINDOWS_URL }}" -OutFile "elastix.zip"
          Expand-Archive -Path "elastix.zip" -DestinationPath "win\elastix-5.0.1-win64"
          $deepslice_weights = "envs\deepslice\lib\site-packages\DeepSlice\metadata\weights"
          New-Item -ItemType Directory -Force -Path $deepslice_weights
          $models = @("${{ env.MODEL1 }}", "${{ env.MODEL2 }}", "${{ env.MODEL3 }}")
          foreach ($model in $models) {
            $url = "${{ env.DEEPSLICE_BASE_URL }}" + $model
            $dest = Join-Path $deepslice_weights $model
            if (-not (Test-Path $dest)) {
              Invoke-WebRequest -Uri $url -OutFile $dest
            }
          }
          tar -czvf abba-pack-win.tar.gz img win abba envs

      - name: Build installer
        shell: bash -el {0}
        run: constructor .

      - name: List generated files (debug)
        run: dir

      - name: Rename installer
        run: |
          $installer = Get-ChildItem -Filter "ABBA-*.exe"
          if ($installer) {
            Rename-Item -Path $installer.Name -NewName "ABBA-Installer-Windows-latest.exe"
          } else {
            Write-Error "Aucun installeur généré (fichier ABBA-*.exe introuvable)"
            exit 1
          }

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABBA-Installer-Windows
          path: ABBA-Installer-Windows-latest.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ABBA-Installer-Windows-latest.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_debian_installer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read versions config
        id: versions
        run: |
          # BUG FIX 1 (Linux) : awk '{print $2}' ne récupère que le mot après le premier espace,
          # ce qui tronque les URLs. On utilise 'cut' pour tout prendre après le premier ': '
          elastix_url=$(grep 'linux_url:' versions.yml | cut -d' ' -f2- | tr -d '"')
          deepslice_base_url=$(grep 'base_url:' versions.yml | cut -d' ' -f2- | tr -d '"')
          model1=$(grep 'xception_weights' versions.yml | awk '{print $2}' | tr -d '"' | tr -d ',')
          model2=$(grep 'Allen_Mixed_Best' versions.yml | awk '{print $2}' | tr -d '"' | tr -d ',')
          model3=$(grep 'Synthetic_data_final' versions.yml | awk '{print $2}' | tr -d '"' | tr -d ',')

          echo "ELASTIX_LINUX_URL=$elastix_url" >> $GITHUB_ENV
          echo "DEEPSLICE_BASE_URL=$deepslice_base_url" >> $GITHUB_ENV
          echo "MODEL1=$model1" >> $GITHUB_ENV
          echo "MODEL2=$model2" >> $GITHUB_ENV
          echo "MODEL3=$model3" >> $GITHUB_ENV

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.8
          channels: conda-forge
          conda-remove-defaults: true

      - name: Install conda-constructor
        # BUG FIX 2 : sans 'shell: bash -el {0}', conda n'est pas initialisé
        # dans le shell et la commande échoue avec exit code 1
        shell: bash -el {0}
        run: conda install -y constructor

      - name: Prepare Debian environment
        shell: bash -el {0}
        run: |
          wget "${{ env.ELASTIX_LINUX_URL }}" -O elastix.tar.bz2
          mkdir -p linux
          tar -xjf elastix.tar.bz2 -C linux/
          mkdir -p envs/deepslice/lib/python3.7/site-packages/DeepSlice/metadata/weights/
          models=("${{ env.MODEL1 }}" "${{ env.MODEL2 }}" "${{ env.MODEL3 }}")
          for model in "${models[@]}"; do
            url="${{ env.DEEPSLICE_BASE_URL }}$model"
            dest="envs/deepslice/lib/python3.7/site-packages/DeepSlice/metadata/weights/$model"
            if [ ! -f "$dest" ]; then
              wget "$url" -O "$dest"
            fi
          done
          tar -czvf abba-pack-linux.tar.gz img linux abba envs

      - name: Build Debian installer
        shell: bash -el {0}
        run: constructor .

      - name: List generated files (debug)
        run: ls -la

      - name: Rename Debian installer
        run: |
          installer=$(ls ABBA-*.sh)
          if [ -n "$installer" ]; then
            mv "$installer" "ABBA-Installer-Linux-latest.sh"
          else
            echo "Aucun installeur généré (fichier ABBA-*.sh introuvable)"
            exit 1
          fi

      - name: Convert to .deb package
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          mkdir -p abba_deb/DEBIAN
          mkdir -p abba_deb/usr/local/abba
          cp -r * abba_deb/usr/local/abba/
          cat > abba_deb/DEBIAN/control <<EOF
          Package: abba
          Version: 0.10.7
          Section: science
          Priority: optional
          Architecture: amd64
          Maintainer: Need to be defined
          Description: ABBA Installer for Debian/Ubuntu
            ABBA is a tool for advanced bioimage analysis.
          EOF
          dpkg-deb --build abba_deb ABBA-Installer-Debian-latest.deb

      - name: Upload Debian installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABBA-Installer-Debian
          path: ABBA-Installer-Debian-latest.deb

      - name: Add Debian installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ABBA-Installer-Debian-latest.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}