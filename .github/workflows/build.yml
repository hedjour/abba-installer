name: Build and Release Installers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  ELASTIX_VERSION: "5.0.1"
  ELASTIX_WINDOWS_URL: "https://github.com/SuperElastix/elastix/releases/download/5.0.1/elastix-5.0.1-win64.zip"
  ELASTIX_LINUX_URL: "https://github.com/SuperElastix/elastix/releases/download/5.0.1/elastix-5.0.1-linux.tar.bz2"
  DEEPSLICE_BASE_URL: "https://data-proxy.ebrains.eu/api/v1/buckets/deepslice/weights/"
  DEEPSLICE_MODEL1: "xception_weights_tf_dim_ordering_tf_kernels.h5"
  DEEPSLICE_MODEL2: "Allen_Mixed_Best.h5"
  DEEPSLICE_MODEL3: "Synthetic_data_final.hdf5"

jobs:
  build_windows_installer:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.8
          channels: conda-forge
          conda-remove-defaults: true

      - name: Install conda-constructor
        shell: bash -el {0}
        run: conda install -y constructor

      - name: Prepare Windows environment
        shell: bash -el {0}
        run: |
          curl -L "$ELASTIX_WINDOWS_URL" -o elastix.zip
          unzip elastix.zip -d win/elastix-5.0.1-win64

          weights_dir="envs/deepslice/lib/site-packages/DeepSlice/metadata/weights"
          mkdir -p "$weights_dir"

          for model in "$DEEPSLICE_MODEL1" "$DEEPSLICE_MODEL2" "$DEEPSLICE_MODEL3"; do
            dest="$weights_dir/$model"
            if [ ! -f "$dest" ]; then
              curl -L "${DEEPSLICE_BASE_URL}${model}" -o "$dest"
            fi
          done

          tar -czvf abba-pack-win.tar.gz img win abba envs

      - name: Build installer
        shell: bash -el {0}
        run: constructor .

      - name: List generated files (debug)
        shell: bash -el {0}
        run: ls -la

      - name: Rename installer
        shell: bash -el {0}
        run: |
          installer=$(ls ABBA-*.exe 2>/dev/null | head -n1)
          if [ -n "$installer" ]; then
            mv "$installer" "ABBA-Installer-Windows-latest.exe"
          else
            echo "Aucun installeur généré (fichier ABBA-*.exe introuvable)"
            exit 1
          fi

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABBA-Installer-Windows
          path: ABBA-Installer-Windows-latest.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ABBA-Installer-Windows-latest.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_debian_installer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.8
          channels: conda-forge
          conda-remove-defaults: true

      - name: Install conda-constructor
        shell: bash -el {0}
        run: conda install -y constructor

      - name: Prepare Linux environment
        shell: bash -el {0}
        run: |
          curl -L "$ELASTIX_LINUX_URL" -o elastix.tar.bz2
          mkdir -p linux
          tar -xjf elastix.tar.bz2 -C linux/

          weights_dir="envs/deepslice/lib/python3.7/site-packages/DeepSlice/metadata/weights"
          mkdir -p "$weights_dir"

          for model in "$DEEPSLICE_MODEL1" "$DEEPSLICE_MODEL2" "$DEEPSLICE_MODEL3"; do
            dest="$weights_dir/$model"
            if [ ! -f "$dest" ]; then
              curl -L "${DEEPSLICE_BASE_URL}${model}" -o "$dest"
            fi
          done

          tar -czvf abba-pack-linux.tar.gz img linux abba envs

      - name: Build Linux installer
        shell: bash -el {0}
        run: constructor .

      - name: List generated files (debug)
        run: ls -la

      - name: Rename Linux installer
        run: |
          installer=$(ls ABBA-*.sh 2>/dev/null | head -n1)
          if [ -n "$installer" ]; then
            mv "$installer" "ABBA-Installer-Linux-latest.sh"
          else
            echo "Aucun installeur généré (fichier ABBA-*.sh introuvable)"
            exit 1
          fi

      - name: Convert to .deb package
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          mkdir -p abba_deb/DEBIAN
          mkdir -p abba_deb/usr/local/abba
          cp -r * abba_deb/usr/local/abba/
          cat > abba_deb/DEBIAN/control <<EOF
          Package: abba
          Version: 0.10.7
          Section: science
          Priority: optional
          Architecture: amd64
          Maintainer: Need to be defined
          Description: ABBA Installer for Debian/Ubuntu
            ABBA is a tool for advanced bioimage analysis.
          EOF
          dpkg-deb --build abba_deb ABBA-Installer-Debian-latest.deb

      - name: Upload Debian installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABBA-Installer-Debian
          path: ABBA-Installer-Debian-latest.deb

      - name: Add Debian installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ABBA-Installer-Debian-latest.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}